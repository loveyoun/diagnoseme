services:
  db:
    build: ./Dockerfiles/postgres
    container_name: db
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db:/docker-entrypoint-initdb.d
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-dm}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - dm-network

  redis:
    image: redis:alpine
    container_name: redis
    #    volumes:
    #      - ./utils/redis/redis.conf:/usr/local/etc/redis/redis.conf  # 로컬 파일을 컨테이너로 복사
    #    command: redis-server /usr/local/etc/redis/redis.conf  # 설정 파일을 읽으며 실행
    command: redis-server --requirepass ${REDIS_PASSWORD} --port ${REDIS_PORT} --bind 0.0.0.0
    env_file:
      - .env
    # 보안: 외부 접속을 차단하고 서버 로컬(127.0.0.1)에서만 접근 허용
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "-p", "${REDIS_PORT}", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - dm-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    profiles: [ "debug" ]
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL:-admin@admin.com}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD:-admin}
      # 브라우저에서 로그인, 서버 등록을 수동으로 안 하게
      - PGADMIN_CONFIG_SERVER_MODE=False
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./scripts/pgadmin/servers.json:/pgadmin4/servers.json
      - ./scripts/pgadmin/.pgpass:/tmp/pgpassfile
    # pgAdmin이 비번 파일을 읽을 수 있게 권한을 강제로 부여하는 명령어 추가
    entrypoint: >
      /bin/sh -c "
      cp /tmp/pgpassfile /var/lib/pgadmin/pgpass &&
      chmod 600 /var/lib/pgadmin/pgpass &&
      /entrypoint.sh"
    ports:
      - "${PGADMIN_PORT:-18080}:80"
    depends_on:
      db:
        condition: service_healthy  # DB가 준비(Healthcheck 통과)된 후 실행
    restart: unless-stopped
    networks:
      - dm-network

volumes:
  postgres_data:
  pgadmin_data:

networks:
  dm-network:
    driver: bridge

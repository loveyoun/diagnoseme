services:
  app:
    build:
      context: .
      dockerfile: ./Dockerfiles/app/Dockerfile
    container_name: app
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dm-network

  db:
    build: ./Dockerfiles/postgres
    container_name: db
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-dm}" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - dm-network

  redis:
    image: redis:alpine
    container_name: redis
    #    volumes:
    #      - ./utils/redis/redis.conf:/usr/local/etc/redis/redis.conf  # 로컬 파일을 컨테이너로 복사
    #    command: redis-server /usr/local/etc/redis/redis.conf  # 설정 파일을 읽으며 실행
    command: redis-server --requirepass ${REDIS_PASSWORD} --port ${REDIS_PORT} --bind 0.0.0.0
    env_file:
      - .env.prod
    # 보안: 외부 접속을 차단하고 서버 로컬(127.0.0.1)에서만 접근 허용
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "-p", "${REDIS_PORT}", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - dm-network

volumes:
  postgres_data:
  pgadmin_data:

networks:
  dm-network:
    driver: bridge
